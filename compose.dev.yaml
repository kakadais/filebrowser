services:
  filebrowser:
    container_name: filebrowser-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.compose-dev
    ports:
      - "8080:80"
    volumes:
      - ./data:/srv
      - ./.docker-dev/config:/config
      - ./.docker-dev/database:/database
    command:
      - --noauth
      - --address=0.0.0.0
      - --port=80
